name: Bug report
description: Report a reproducible UniPet issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a UniPet issue. Please include enough detail for another maintainer to reproduce it.
  - type: input
    id: version
    attributes:
      label: UniPet version
      description: Run `unipet status` or `npm list -g uni-pet --depth=0`.
      placeholder: "0.1.3"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - WSL
        - Other
    validations:
      required: true
  - type: dropdown
    id: connector
    attributes:
      label: Connector
      options:
        - UniPet runtime / CLI
        - Codex
        - Claude Code
        - Hermes
        - OpenClaw
        - DeepSeek-TUI
        - Custom agent
        - Pet market / skins
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Then ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: `unipet doctor` output
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Drag screenshots, terminal output, or relevant logs here.
